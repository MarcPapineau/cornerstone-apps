[build]
  publish = "dist"
  functions = "netlify/functions"

# Background function: 15-minute window — BUG-001 fix (Anthropic call duration)
# The "-background.js" suffix signals Netlify to use the background queue.
[functions."vitalis-chat-background"]
  included_files = []

# Friendly alias for the Vitalis chat function
[[redirects]]
  from = "/api/vitalis-chat"
  to = "/.netlify/functions/vitalis-chat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
