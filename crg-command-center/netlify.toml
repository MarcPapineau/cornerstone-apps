[build]
  functions = "netlify/functions"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

# Friendly /api/* aliases for the dashboard fetches
[[redirects]]
  from   = "/api/queue-list"
  to     = "/.netlify/functions/queue-list"
  status = 200

[[redirects]]
  from   = "/api/queue-update"
  to     = "/.netlify/functions/queue-update"
  status = 200

[[redirects]]
  from   = "/api/morning-brief"
  to     = "/.netlify/functions/morning-brief"
  status = 200

[[redirects]]
  from   = "/api/research-feed"
  to     = "/.netlify/functions/research-feed"
  status = 200

[[redirects]]
  from   = "/api/status"
  to     = "/.netlify/functions/status"
  status = 200

[[redirects]]
  from   = "/api/command-scorecards"
  to     = "/.netlify/functions/command-scorecards"
  status = 200

[[redirects]]
  from   = "/api/command-events"
  to     = "/.netlify/functions/command-events"
  status = 200

[[redirects]]
  from   = "/api/autonomy-mode"
  to     = "/.netlify/functions/autonomy-mode"
  status = 200

[[redirects]]
  from   = "/api/autonomy-mode-set"
  to     = "/.netlify/functions/autonomy-mode-set"
  status = 200

[[redirects]]
  from   = "/api/command-samuel-digest"
  to     = "/.netlify/functions/command-samuel-digest"
  status = 200

